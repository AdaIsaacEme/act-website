    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: #0A1628;
        --color-secondary: #1E3A5F;
        --color-accent: #00A8E8;
        --color-accent-warm: #F59E0B;
        --color-surface: #0F2137;
        --color-text: #E8EFF8;
        --color-muted: #7A9ABD;
        --font-display: 'Bebas Neue', sans-serif;
        --font-body: 'DM Sans', sans-serif;
      }

      body {
        background-color: var(--color-primary);
        color: var(--color-text);
        font-family: var(--font-body);
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-display);
        letter-spacing: 0.02em;
      }

      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-scroll {
        animation: scroll 20s linear infinite;
      }

      @keyframes noise {
        0% { background-position: 0 0; }
        10% { background-position: -5px -10px; }
        20% { background-position: -10px 5px; }
        30% { background-position: 5px -5px; }
        40% { background-position: -5px -5px; }
        50% { background-position: -10px 10px; }
        60% { background-position: 10px -10px; }
        70% { background-position: -10px -10px; }
        80% { background-position: 5px 5px; }
        90% { background-position: -5px 10px; }
        100% { background-position: 0 0; }
      }

      .noise-overlay {
        background-image:
          url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="4" result="noise"/><feColorMatrix in="noise" type="saturate" values="0"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.05"/></svg>');
        animation: noise 0.2s infinite;
      }
    </style>
